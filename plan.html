<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SICDC LRPSMS – Project Gantt Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0b0f1a;
    --surface:     #111827;
    --border:      #1e2d45;
    --text:        #e8edf5;
    --muted:       #5a7090;
    --accent:      #2563eb;
    --accent-glow: rgba(37,99,235,.25);
    --cell-weekend: #0e1424;
    --cell-past:    #0a0e17;
    --day-weekend-color: #2f4565;
    --day-weekend-bg: #0e1424;
    --day-past-color: #1e3050;
    --cell-border:  rgba(255,255,255,.03);
    --bar-text:     rgba(255,255,255,.9);
    --hover-bg:     rgba(37,99,235,.06);
    --today-col-bg: rgba(37,99,235,.07);
    --today-col-border: rgba(37,99,235,.5);
    --bar-gloss:    rgba(255,255,255,.12);
    --task-x-pad:   12px;
    --bar-h:        22px;

    /* Workstream colours */
    --c-infra:    #0ea5e9;
    --c-data:     #f59e0b;
    --c-training: #10b981;
    --c-access:   #a855f7;
    --c-billing:  #f97316;
    --c-valid:    #06b6d4;
    --c-bug:      #ef4444;
    --c-golive:   #22c55e;

    --row-h:      58px;
    --header-h:   64px;
  }

  /* ── LIGHT MODE ─────────────────────────────────────── */
  :root.light {
    --bg:          #f8f9fc;
    --surface:     #ffffff;
    --border:      #e2e8f0;
    --text:        #1e293b;
    --muted:       #64748b;
    --accent:      #2563eb;
    --accent-glow: rgba(37,99,235,.15);
    --cell-weekend: #f1f5f9;
    --cell-past:    #f8fafc;
    --day-weekend-color: #94a3b8;
    --day-weekend-bg: #f1f5f9;
    --day-past-color: #cbd5e1;
    --cell-border:  rgba(0,0,0,.06);
    --bar-text:     #ffffff;
    --hover-bg:     rgba(37,99,235,.06);
    --today-col-bg: rgba(37,99,235,.06);
    --today-col-border: rgba(37,99,235,.3);
    --bar-gloss:    rgba(255,255,255,.2);

    --c-data:     #d97706;
    --c-training: #059669;
    --c-access:   #7c3aed;
    --c-billing:  #ea580c;
    --c-valid:    #0891b2;
    --c-bug:      #dc2626;
    --c-golive:   #16a34a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── TOP BAR ─────────────────────────────────────────── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  #topbar .logo {
    font-weight: 800;
    font-size: 1.35rem;
    letter-spacing: .04em;
    color: var(--text);
  }
  #topbar .logo span { color: var(--accent); }
  #topbar .meta {
    font-size: .88rem;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: .03em;
  }
  #topbar .today-badge {
    background: var(--accent);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: .82rem;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 999px;
    letter-spacing: .06em;
  }
  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }
  .settings-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: .04em;
    transition: background .2s, border-color .2s;
  }
  .settings-btn:hover,
  .settings-btn[aria-expanded="true"] {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .settings-panel {
    position: absolute;
    top: 42px;
    right: 0;
    width: 290px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 16px 40px rgba(0,0,0,.28);
    padding: 16px;
    z-index: 150;
  }
  .settings-panel[hidden] { display: none; }
  .settings-title {
    margin-bottom: 12px;
    font-size: .82rem;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    min-height: 34px;
    color: var(--text);
    font-size: .86rem;
  }
  .setting-row + .setting-row { margin-top: 12px; }
  .setting-label { display: flex; flex-direction: column; gap: 3px; }
  .setting-value {
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .settings-panel input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .settings-panel input[type="range"] {
    width: 118px;
    accent-color: var(--accent);
  }
  .settings-action {
    width: 100%;
    margin-top: 16px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: .84rem;
    font-weight: 700;
    padding: 9px 12px;
    border-radius: 7px;
    cursor: pointer;
  }
  .settings-action:hover {
    filter: brightness(1.05);
  }

  /* ── LEGEND ─────────────────────────────────────────── */
  #legend {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 44px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 24px;
    padding: 0 32px;
    z-index: 100;
  }
  .leg-item { display: flex; align-items: center; gap: 7px; }
  .leg-dot  { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .leg-dot.diamond { transform: rotate(45deg); }
  .leg-label { font-size: .82rem; color: var(--muted); white-space: nowrap; }

  /* ── SCROLL CONTAINER ──────────────────────────────── */
  #scroll-wrap {
    position: fixed;
    top: var(--header-h); bottom: 44px; left: 0; right: 0;
    overflow: auto;
  }

  /* ── GRID ──────────────────────────────────────────── */
  #gantt {
    display: grid;
    /* col 1: workstream label, col 2: task, col 3: assignee, col 4+: days */
    min-width: 1400px;
  }

  /* ── STICKY MONTH / DAY HEADER ─────────────────────── */
  .hdr-row {
    display: contents;
  }
  .hdr-cell {
    position: sticky; top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: .8rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .07em;
    text-transform: uppercase;
    height: 28px;
  }
  .hdr-month {
    position: sticky; top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: .85rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .08em;
    text-transform: uppercase;
    height: 28px;
    border-right: 1px solid var(--border);
  }
  .hdr-month-spacer {
    position: sticky; top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 50;
    height: 28px;
  }
  .day-hdr {
    position: sticky; top: 28px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    font-size: .78rem;
    font-weight: 500;
    color: var(--muted);
    height: 28px;
    border-right: 1px solid var(--cell-border);
    transition: color .2s;
  }
  .day-hdr.weekend { color: var(--day-weekend-color); background: var(--day-weekend-bg); }
  .day-hdr.today   { color: #fff; background: var(--accent); border-color: var(--accent); }
  .day-hdr.past    { color: var(--day-past-color); }
  .label-hdr {
    position: sticky; top: 0; left: 0;
    background: var(--surface);
    z-index: 80;
    height: 52px;
    border-bottom: 2px solid var(--border);
    border-right: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    font-family: 'Inter', sans-serif; font-size: .8rem; font-weight: 700;
    color: var(--muted); letter-spacing: .08em; text-transform: uppercase;
  }

  /* ── DATA ROWS ─────────────────────────────────────── */
  .row {
    display: contents;
  }
  .row:hover .cell,
  .row:hover .ws-cell,
  .row:hover .task-cell,
  .row:hover .asgn-cell { background: var(--hover-bg); }

  .ws-cell {
    position: sticky; left: 0;
    background: var(--bg);
    z-index: 30;
    display: flex; align-items: center;
    padding: 0 0 0 calc(var(--task-x-pad) + 4px);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    height: var(--row-h);
    font-family: 'Inter', sans-serif;
    font-size: .8rem; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    transition: background .15s;
    white-space: nowrap;
  }
  .ws-tag {
    display: flex; align-items: center; gap: 7px;
  }
  .ws-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .task-cell {
    background: var(--bg);
    z-index: 10;
    display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
    padding: 0 var(--task-x-pad);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    height: var(--row-h);
    line-height: 1.25; color: var(--text);
    transition: background .15s;
    overflow: hidden;
  }
  .task-title {
    font-size: .86rem; font-weight: 500;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-description,
  .task-deps {
    max-width: 100%;
    margin-top: 3px;
    font-size: .72rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  :root.hide-task-details .task-description,
  :root.hide-task-details .task-deps {
    display: none;
  }
  .asgn-cell {
    background: var(--bg);
    z-index: 10;
    display: flex; align-items: center;
    padding: 0 var(--task-x-pad);
    border-bottom: 1px solid var(--border);
    border-right: 2px solid var(--border);
    height: var(--row-h);
    font-size: .82rem; color: var(--muted);
    white-space: nowrap;
    transition: background .15s;
  }

  .cell {
    background: var(--bg);
    border-bottom: 1px solid var(--cell-border);
    border-right: 1px solid var(--cell-border);
    height: var(--row-h);
    position: relative;
    transition: background .15s;
  }
  .cell.weekend { background: var(--cell-weekend); }
  .cell.today-col { background: var(--today-col-bg); border-right: 1px solid var(--today-col-border); }
  .cell.past     { background: var(--cell-past); }

  /* ── BAR ───────────────────────────────────────────── */
  .bar {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    left: 3px; right: 3px;
    height: var(--bar-h);
    border-radius: 5px;
    display: flex; align-items: center;
    padding: 0 8px;
    font-size: .76rem; font-weight: 600;
    color: var(--bar-text);
    letter-spacing: .02em;
    overflow: hidden;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .bar::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
  }
  .bar.milestone-diamond {
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 3px;
    transform: translateY(-50%) rotate(45deg);
  }

  /* ── TODAY LINE ─────────────────────────────────────── */
  .today-line {
    position: absolute; top: 0; bottom: 0;
    left: 50%; width: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    z-index: 20; pointer-events: none;
  }
  #print-report {
    display: none;
  }

  @media print {
    @page {
      size: A4 portrait;
      margin: 12mm;
    }

    :root,
    :root.light {
      --print-text: #0f172a;
      --print-muted: #475569;
      --print-border: #d8e0eb;
      --print-soft: #f5f7fb;
      --print-accent: #2563eb;
    }

    html,
    body {
      width: auto;
      height: auto;
      overflow: visible;
      background: #ffffff;
      color: var(--print-text);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    #topbar,
    #legend,
    #scroll-wrap {
      display: none !important;
    }

    #print-report {
      display: block;
      font-size: 10px;
      line-height: 1.35;
    }

    .print-cover {
      padding-bottom: 12px;
      border-bottom: 2px solid var(--print-accent);
      margin-bottom: 14px;
    }

    .print-kicker {
      margin-bottom: 4px;
      color: var(--print-accent);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .print-title {
      margin-bottom: 5px;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .print-subtitle {
      color: var(--print-muted);
      font-size: 10.5px;
    }

    .print-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .print-card {
      min-height: 54px;
      padding: 9px;
      border: 1px solid var(--print-border);
      border-radius: 8px;
      background: var(--print-soft);
    }

    .print-card-label {
      margin-bottom: 5px;
      color: var(--print-muted);
      font-size: 7.5px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .print-card-value {
      font-size: 12px;
      font-weight: 800;
    }

    .print-section-title {
      margin: 14px 0 7px;
      font-size: 12px;
      font-weight: 800;
      color: var(--print-text);
    }

    .print-project-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid var(--print-border);
      border-radius: 8px;
    }

    .print-field-label {
      color: var(--print-muted);
      font-size: 7.5px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .print-field-value {
      margin-top: 2px;
      font-size: 10px;
      font-weight: 700;
    }

    .print-task-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .print-task-table th,
    .print-task-table td {
      padding: 6px 5px;
      border-bottom: 1px solid var(--print-border);
      vertical-align: top;
      text-align: left;
    }

    .print-task-table th {
      background: var(--print-soft);
      color: var(--print-muted);
      font-size: 7.5px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .print-task-table tr {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .print-task-main {
      font-weight: 800;
    }

    .print-task-description {
      margin-top: 3px;
      color: var(--print-muted);
      font-size: 8.5px;
    }

    .print-pill {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      background: #e8f0ff;
      color: #1d4ed8;
      font-size: 7.5px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .print-muted {
      color: var(--print-muted);
    }

    .print-footer {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid var(--print-border);
      color: var(--print-muted);
      font-size: 8px;
    }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo"><span>SICDC</span> LRPSMS &nbsp;·&nbsp; Project Rollout Plan</div>
  <div class="topbar-actions">
    <div class="meta" id="updatedMeta">Updated: 25 June 2026</div>
    <div class="today-badge" id="todayBadge">TODAY</div>
    <button class="settings-btn" id="settingsToggle" type="button" aria-expanded="false" aria-controls="settingsPanel">&#9881; Settings</button>
    <div class="settings-panel" id="settingsPanel" hidden>
      <div class="settings-title">Chart Settings</div>
      <label class="setting-row">
        <span class="setting-label">
          <span>Dark theme</span>
        </span>
        <input id="settingDarkTheme" type="checkbox">
      </label>
      <label class="setting-row">
        <span class="setting-label">
          <span>Padding</span>
          <span class="setting-value" id="paddingValue">Comfortable</span>
        </span>
        <input id="settingDensity" type="range" min="0" max="2" step="1" value="1">
      </label>
      <label class="setting-row">
        <span class="setting-label">
          <span>Hide weekends</span>
        </span>
        <input id="settingHideWeekends" type="checkbox">
      </label>
      <label class="setting-row">
        <span class="setting-label">
          <span>Hide task column</span>
        </span>
        <input id="settingHideDescriptions" type="checkbox">
      </label>
      <button class="settings-action" id="exportPdfBtn" type="button">Export Printable PDF</button>
    </div>
  </div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-data)"></div><span class="leg-label">Migration Schedule & Data Migration/</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-training)"></div><span class="leg-label">Training Schedule & Training</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-access)"></div><span class="leg-label">User Matrix</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-billing)"></div><span class="leg-label">Billing</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-valid)"></div><span class="leg-label">Validation</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-bug)"></div><span class="leg-label">Bug Management & Fixing</span></div>
  <div class="leg-item"><div class="leg-dot diamond" style="background:var(--c-golive)"></div><span class="leg-label">Go-Live</span></div>
</div>

<!-- SCROLL WRAPPER -->
<div id="scroll-wrap">
  <div id="gantt"></div>
</div>

<section id="print-report" aria-label="Printable project plan report"></section>

<script>
// ── DATA ─────────────────────────────────────────────────
// EDIT THE PLAN HERE
// startDay and durationDays are counted in working days from PROJECT.startDate.
// startDay: 0 means the project start date itself.
// durationDays: 1 means a one-day task.
// dependsOn can push a task later than startDay when predecessors finish later.
// Optional absolute startDate/endDate values can be used for exceptions.
const PROJECT = {
  startDate: "2026-06-22",
  updatedLabel: "26 June 2026",
  useBusinessDays: true,
  defaultDependencyLagDays: 1,
};

const TASK_DEFINITIONS = [
  {
    id: "migration-prep",
    workstream: "Migration Prep",
    task: "Create SICDC migration data sheet",
    description: "Collect and create  data required for migration on the data sheet.",
    team: "SICDC Team",
    startDay: 0,
    durationDays: 11,
  },
  {
    id: "user-matrix",
    workstream: "User Matrix",
    task: "Plan users for the 3 levels of approvals",
    description: "Determine the users for the 3 levels of approvals and their roles in the system.",
    team: "SICDC Team",
    startDay: 0,
    durationDays: 10,
  },
    {
    id: "training-schedule",
    workstream: "Training Sch.",
    task: "Schedule training sessions with dates",
    description: "Confirm training calendar with participants.",
    team: "Project Coordinator",
    startDay: 5,
    durationDays: 5,
  },
    {
    id: "migration-schedule",
    workstream: "Migration Sch.",
    task: "Coordinate and schedule migration session",
    description: "Confirm migration timing and participants.",
    team: "Project Coordinator",
    startDay: 5,
    durationDays: 5,
  },
  {
    id: "CFO-Vetting",
    workstream: "CFO Vetting",
    task: "CFO vet the extracted data sheets",
    description: "CFO to vet the extracted data sheets for accuracy and completeness.",
    team: "Project Coordinator",  
    startDay: 11,
    durationDays: 4,
  },
  {
    id: "trainings",
    workstream: "Trainings",
    task: "Conduct operations officer training session",
    description: "4 half day sessions with operation officers, IT admin and Managers",
    team: "MNS Team",
    startDay: 9,
    durationDays: 4,
    dependsOn: ["training-schedule"],
    dependencyLagDays: 2,
  },
  
  {
    id: "data-migration",
    workstream: "Data Migration",

function parseProjectDate(value) {
  return new Date(value + "T00:00:00");
}

function toISODate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function cloneDate(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function isProjectWeekend(date) {
  const day = date.getDay();
  return day === 0 || day === 6;
}

function addCalendarDays(date, days) {
  const next = cloneDate(date);
  next.setDate(next.getDate() + days);
  return next;
}

function addBusinessDays(date, days) {
  const next = cloneDate(date);
  let remaining = Math.abs(days);
  const step = days < 0 ? -1 : 1;

  while (remaining > 0) {
    next.setDate(next.getDate() + step);
    if (!isProjectWeekend(next)) remaining--;
  }

  return next;
}

function addProjectDays(date, days) {
  return PROJECT.useBusinessDays ? addBusinessDays(date, days) : addCalendarDays(date, days);
}

function laterDate(a, b) {
  return a > b ? a : b;
}

function resolveTasks(taskDefinitions) {
  const byId = new Map(taskDefinitions.map(task => [task.id, task]));
  const resolved = new Map();
  const resolving = new Set();
  const projectStart = parseProjectDate(PROJECT.startDate);

  function resolve(task) {
    if (!task.id) throw new Error("Every task needs an id.");
    if (resolved.has(task.id)) return resolved.get(task.id);
    if (resolving.has(task.id)) throw new Error(`Circular dependency detected at ${task.id}.`);

    resolving.add(task.id);

    const startOffset = task.startDay ?? 0;
    let start = task.startDate ? parseProjectDate(task.startDate) : addProjectDays(projectStart, startOffset);
    const dependencies = task.dependsOn || [];

    dependencies.forEach(depId => {
      const dependency = byId.get(depId);
      if (!dependency) throw new Error(`Task ${task.id} depends on missing task ${depId}.`);

      const resolvedDependency = resolve(dependency);
      const lag = task.dependencyLagDays ?? PROJECT.defaultDependencyLagDays;
      start = laterDate(start, addProjectDays(resolvedDependency.endDate, lag));
    });

    const durationDays = Math.max(1, task.durationDays || 1);
    const end = task.endDate ? parseProjectDate(task.endDate) : addProjectDays(start, durationDays - 1);
    if (end < start) throw new Error(`Task ${task.id} ends before it starts.`);

    const item = {
      id: task.id,
      ws: task.workstream,
      task: task.task,
      description: task.description || "",
      assignee: task.team,
      start: toISODate(start),
      end: toISODate(end),
      startDate: start,
      endDate: end,
      dependencies,
      visual: task.visual || "bar",
    };

    resolving.delete(task.id);
    resolved.set(task.id, item);
    return item;
  }

  return taskDefinitions.map(resolve);
}

const TASKS = resolveTasks(TASK_DEFINITIONS);

const WS_COLORS = {
  "Data Migration":     "var(--c-data)",
  "Migration Sch.": "var(--c-data)",
  "Migration Prep": "var(--c-data)",
  "Training":           "var(--c-training)",
  "Training Sch.":  "var(--c-training)",
  "User Matrix":        "var(--c-access)",
  "Billing":            "var(--c-billing)",
  "Validation":         "var(--c-valid)",
  "Bug Management":     "var(--c-bug)",
  "Bug Fixing":     "var(--c-bug)",
  "Go-Live Prep":       "var(--c-golive)",
  "Go-Live":            "var(--c-golive)",
};

// ── BUILD DATE RANGE ──────────────────────────────────────
const parseDate = s => new Date(s + "T00:00:00");
const taskDateBounds = TASKS.flatMap(t => [parseDate(t.start), parseDate(t.end)]);
const minDate = new Date(Math.min(...taskDateBounds));
const maxDate = new Date(Math.max(...taskDateBounds));

// Pad 3 days on each side
minDate.setDate(minDate.getDate() - 3);
maxDate.setDate(maxDate.getDate() + 4);

const allProjectDays = [];
let cur = new Date(minDate);
while (cur <= maxDate) {
  allProjectDays.push(new Date(cur));
  cur.setDate(cur.getDate() + 1);
}

const todayDate = new Date();
todayDate.setHours(0,0,0,0);

// ── UPDATE BADGE ─────────────────────────────────────────
document.getElementById('todayBadge').textContent =
  todayDate.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
document.getElementById('updatedMeta').textContent = `Updated: ${PROJECT.updatedLabel}`;

// ── COLUMN WIDTHS ─────────────────────────────────────────
const COL_WS = 170;
const COL_TASK = 380;
const COL_ASGN = 160;
const COL_DAY = 34;
const SETTINGS_KEY = "sicdc-gantt-settings";

const DENSITY_OPTIONS = [
  { label: "Compact", rowH: "46px", taskPad: "8px", barH: "18px", milestoneSize: 18 },
  { label: "Comfortable", rowH: "58px", taskPad: "12px", barH: "22px", milestoneSize: 22 },
  { label: "Relaxed", rowH: "70px", taskPad: "16px", barH: "26px", milestoneSize: 26 },
];

const defaultSettings = {
  darkTheme: !document.documentElement.classList.contains('light'),
  density: 1,
  hideWeekends: false,
  hideDescriptions: false,
};

function loadSettings() {
  try {
    return { ...defaultSettings, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}") };
  } catch {
    return { ...defaultSettings };
  }
}

const settings = loadSettings();
settings.density = Math.min(DENSITY_OPTIONS.length - 1, Math.max(0, Number(settings.density) || 0));

// ── BUILD GRID ────────────────────────────────────────────
const gantt = document.getElementById('gantt');
const wrap = document.getElementById('scroll-wrap');
const settingsToggle = document.getElementById('settingsToggle');
const settingsPanel = document.getElementById('settingsPanel');
const darkThemeInput = document.getElementById('settingDarkTheme');
const densityInput = document.getElementById('settingDensity');
const paddingValue = document.getElementById('paddingValue');
const hideWeekendsInput = document.getElementById('settingHideWeekends');
const hideDescriptionsInput = document.getElementById('settingHideDescriptions');
const exportPdfBtn = document.getElementById('exportPdfBtn');
const printReport = document.getElementById('print-report');

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  } catch {
    // Settings still apply for the current session when browser storage is unavailable.
  }
}

function isSameDate(a, b) {
  return a.toDateString() === b.toDateString();
}

function isWeekendDay(date) {
  const day = date.getDay();
  return day === 0 || day === 6;
}

function visibleProjectDays() {
  return settings.hideWeekends ? allProjectDays.filter(d => !isWeekendDay(d)) : allProjectDays;
}

function dayIndex(days, date) {
  return days.findIndex(d => isSameDate(d, date));
}

function visibleTaskSpan(days, start, end) {
  const startIndex = days.findIndex(d => d >= start && d <= end);
  let endIndex = -1;
  for (let i = days.length - 1; i >= 0; i--) {
    if (days[i] >= start && days[i] <= end) {
      endIndex = i;
      break;
    }
  }
  return startIndex === -1 || endIndex === -1 ? null : { startIndex, endIndex };
}

// ── HELPER: month groups ──────────────────────────────────
function buildMonthGroups(days) {
  const groups = [];
  let cur = null;
  days.forEach((d, i) => {
    const key = d.toLocaleDateString('en-GB', { month:'long', year:'numeric' });
    if (!cur || cur.label !== key) { cur = { label: key, start: i, count: 0 }; groups.push(cur); }
    cur.count++;
  });
  return groups;
}

// ── ROW 1: Month headers ──────────────────────────────────
function formatDisplayDate(value) {
  const date = value instanceof Date ? value : parseDate(value);
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function appendText(parent, tagName, className, text) {
  const el = document.createElement(tagName);
  if (className) el.className = className;
  el.textContent = text;
  parent.appendChild(el);
  return el;
}

function buildPrintableReport() {
  const taskById = new Map(TASKS.map(task => [task.id, task]));
  const projectStart = formatDisplayDate(PROJECT.startDate);
  const projectEnd = formatDisplayDate(new Date(Math.max(...TASKS.map(task => task.endDate))));

  printReport.replaceChildren();

  const cover = document.createElement('header');
  cover.className = 'print-cover';
  appendText(cover, 'div', 'print-kicker', 'SICDC LRPSMS');
  appendText(cover, 'h1', 'print-title', 'Project Rollout Plan');
  appendText(cover, 'div', 'print-subtitle', `Printable project and task definition report · Updated ${PROJECT.updatedLabel}`);
  printReport.appendChild(cover);

  const summary = document.createElement('section');
  summary.className = 'print-summary';
  [
    ['Project Start', projectStart],
    ['Projected Finish', projectEnd],
    ['Schedule Mode', PROJECT.useBusinessDays ? 'Business days' : 'Calendar days'],
    ['Task Count', `${TASKS.length} tasks`],
  ].forEach(([label, value]) => {
    const card = document.createElement('div');
    card.className = 'print-card';
    appendText(card, 'div', 'print-card-label', label);
    appendText(card, 'div', 'print-card-value', value);
    summary.appendChild(card);
  });
  printReport.appendChild(summary);

  appendText(printReport, 'h2', 'print-section-title', 'Task Definitions');
  const table = document.createElement('table');
  table.className = 'print-task-table';

  const colGroup = document.createElement('colgroup');
  ['22%', '45%', '17%', '16%'].forEach(width => {
    const col = document.createElement('col');
    col.style.width = width;
    colGroup.appendChild(col);
  });
  table.appendChild(colGroup);

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  ['Workstream', 'Task', 'Team', 'Schedule'].forEach(label => {
    appendText(headRow, 'th', '', label);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  TASK_DEFINITIONS.forEach(definition => {
    const resolved = taskById.get(definition.id);
    const row = document.createElement('tr');

    const streamCell = document.createElement('td');
    appendText(streamCell, 'span', 'print-pill', definition.workstream);
    row.appendChild(streamCell);

    const taskCell = document.createElement('td');
    appendText(taskCell, 'div', 'print-task-main', definition.task);
    if (definition.description) appendText(taskCell, 'div', 'print-task-description', definition.description);
    row.appendChild(taskCell);

    appendText(row, 'td', '', definition.team || '-');

    const scheduleCell = document.createElement('td');
    appendText(scheduleCell, 'div', '', resolved ? formatDisplayDate(resolved.start) : '-');
    appendText(scheduleCell, 'div', 'print-muted', resolved ? `to ${formatDisplayDate(resolved.end)}` : '');
    row.appendChild(scheduleCell);

    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  printReport.appendChild(table);
}

function renderGantt(options = {}) {
const previousScrollLeft = wrap.scrollLeft;
const days = visibleProjectDays();
const labelColumnCount = settings.hideDescriptions ? 2 : 3;
const timelineStartColumn = labelColumnCount + 1;

gantt.replaceChildren();
gantt.style.gridTemplateColumns = settings.hideDescriptions
  ? `${COL_WS}px ${COL_ASGN}px repeat(${days.length}, ${COL_DAY}px)`
  : `${COL_WS}px ${COL_TASK}px ${COL_ASGN}px repeat(${days.length}, ${COL_DAY}px)`;

const monthGroups = buildMonthGroups(days);

// sticky left filler (spans 3 label cols across both header rows = 52px total)
const filler = document.createElement('div');
filler.className = 'label-hdr';
filler.style.gridRow    = '1 / span 2';
filler.style.gridColumn = `1 / span ${labelColumnCount}`;
filler.textContent = settings.hideDescriptions ? 'Workstream / Assignee' : 'Workstream / Task';
gantt.appendChild(filler);

// month spans
monthGroups.forEach(g => {
  const el = document.createElement('div');
  el.className = 'hdr-month';
  el.style.gridColumn = `${timelineStartColumn + g.start} / span ${g.count}`;
  el.style.gridRow = '1';
  el.textContent = g.label;
  gantt.appendChild(el);
});

// ── ROW 2: Day headers ────────────────────────────────────
days.forEach((d, i) => {
  const el = document.createElement('div');
  el.className = 'day-hdr';
  const isWeekend = isWeekendDay(d);
  const isToday   = isSameDate(d, todayDate);
  const isPast    = d < todayDate;
  if (isToday)   el.classList.add('today');
  else if (isWeekend) el.classList.add('weekend');
  else if (isPast)    el.classList.add('past');
  el.style.gridColumn = `${timelineStartColumn + i}`;
  el.style.gridRow    = '2';
  el.textContent = d.getDate();
  gantt.appendChild(el);
});

// ── DATA ROWS ─────────────────────────────────────────────
TASKS.forEach((t, rowIdx) => {
  const gridRow = rowIdx + 3; // rows 1 & 2 = headers

  // Workstream cell
  const wsEl = document.createElement('div');
  wsEl.className = 'ws-cell';
  wsEl.style.gridColumn = '1';
  wsEl.style.gridRow    = gridRow;
  const color = WS_COLORS[t.ws] || 'var(--muted)';
  wsEl.innerHTML = `<div class="ws-tag"><div class="ws-dot" style="background:${color}"></div>${t.ws}</div>`;
  gantt.appendChild(wsEl);

  if (!settings.hideDescriptions) {
    const tkEl = document.createElement('div');
    tkEl.className = 'task-cell';
    tkEl.style.gridColumn = '2';
    tkEl.style.gridRow    = gridRow;

    const taskTitle = document.createElement('div');
    taskTitle.className = 'task-title';
    taskTitle.textContent = t.task;
    tkEl.appendChild(taskTitle);

    if (t.description) {
      const taskDescription = document.createElement('div');
      taskDescription.className = 'task-description';
      taskDescription.textContent = t.description;
      tkEl.appendChild(taskDescription);
    }

    if (t.dependencies.length) {
      const taskDeps = document.createElement('div');
      taskDeps.className = 'task-deps';
      taskDeps.textContent = `Depends on: ${t.dependencies.join(', ')}`;
      tkEl.appendChild(taskDeps);
    }

    tkEl.title = `${t.task}\n${t.description}\n${t.start} to ${t.end}`;
    gantt.appendChild(tkEl);
  }

  // Assignee cell
  const aEl = document.createElement('div');
  aEl.className = 'asgn-cell';
  aEl.style.gridColumn = settings.hideDescriptions ? '2' : '3';
  aEl.style.gridRow    = gridRow;
  aEl.textContent = t.assignee;
  gantt.appendChild(aEl);

  // Day cells
  const tStart = parseDate(t.start);
  const tEnd   = parseDate(t.end);
  const taskSpan = visibleTaskSpan(days, tStart, tEnd);

  days.forEach((d, i) => {
    const col = timelineStartColumn + i;
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.gridColumn = col;
    cell.style.gridRow    = gridRow;

    const isWeekend = isWeekendDay(d);
    const isToday   = isSameDate(d, todayDate);
    const isPast    = d < todayDate;

    if (isToday)        cell.classList.add('today-col');
    else if (isWeekend) cell.classList.add('weekend');
    else if (isPast)    cell.classList.add('past');

    // Today line
    if (isToday) {
      const line = document.createElement('div');
      line.className = 'today-line';
      cell.appendChild(line);
    }

    // Bar: render on the FIRST day of the task
    if (taskSpan && i === taskSpan.startIndex) {
      const dur = taskSpan.endIndex - taskSpan.startIndex + 1;
      const barW = dur * COL_DAY - 6;
      const isDiamond = t.visual === "diamond";
      const milestoneSize = DENSITY_OPTIONS[settings.density].milestoneSize;
      const bar  = document.createElement('div');
      bar.className = isDiamond ? 'bar milestone-diamond' : 'bar';
      bar.style.width  = isDiamond ? `${milestoneSize}px` : barW + 'px';
      if (isDiamond) bar.style.height = `${milestoneSize}px`;
      bar.style.background = color;
      bar.style.boxShadow  = `0 2px 12px ${color}55`;
      bar.style.zIndex     = '15';
      bar.style.left       = isDiamond ? `${(COL_DAY - milestoneSize) / 2}px` : '3px';
      bar.title            = `${t.task}: ${t.start} to ${t.end}`;
      if (!isDiamond && dur > 2) bar.textContent = t.ws;
      cell.appendChild(bar);
    }

    gantt.appendChild(cell);
  });
});

// ── SCROLL TO TODAY ───────────────────────────────────────
if (options.scrollToToday) scrollToToday(days);
else wrap.scrollLeft = previousScrollLeft;
}

function scrollToToday(days) {
  const todayIdx = dayIndex(days, todayDate);
  if (todayIdx < 0) return;

  const labelWidth = COL_WS + COL_ASGN + (settings.hideDescriptions ? 0 : COL_TASK);
  const xPos = labelWidth + todayIdx * COL_DAY - (wrap.clientWidth / 2) + COL_DAY / 2;
  wrap.scrollLeft = Math.max(0, xPos);
}

// ── THEME TOGGLE ──────────────────────────────────────────
function applySettings() {
  const density = DENSITY_OPTIONS[settings.density];
  document.documentElement.classList.toggle('light', !settings.darkTheme);
  document.documentElement.classList.toggle('hide-task-details', settings.hideDescriptions);
  document.documentElement.style.setProperty('--row-h', density.rowH);
  document.documentElement.style.setProperty('--task-x-pad', density.taskPad);
  document.documentElement.style.setProperty('--bar-h', density.barH);

  darkThemeInput.checked = settings.darkTheme;
  densityInput.value = String(settings.density);
  paddingValue.textContent = density.label;
  hideWeekendsInput.checked = settings.hideWeekends;
  hideDescriptionsInput.checked = settings.hideDescriptions;
  saveSettings();
}

settingsToggle.addEventListener('click', () => {
  const isOpen = settingsPanel.hidden;
  settingsPanel.hidden = !isOpen;
  settingsToggle.setAttribute('aria-expanded', String(isOpen));
});

document.addEventListener('click', event => {
  if (settingsPanel.hidden) return;
  if (settingsPanel.contains(event.target) || settingsToggle.contains(event.target)) return;
  settingsPanel.hidden = true;
  settingsToggle.setAttribute('aria-expanded', 'false');
});

document.addEventListener('keydown', event => {
  if (event.key !== 'Escape') return;
  settingsPanel.hidden = true;
  settingsToggle.setAttribute('aria-expanded', 'false');
});

darkThemeInput.addEventListener('change', () => {
  settings.darkTheme = darkThemeInput.checked;
  applySettings();
});

densityInput.addEventListener('input', () => {
  settings.density = Number(densityInput.value);
  applySettings();
  renderGantt();
});

hideWeekendsInput.addEventListener('change', () => {
  settings.hideWeekends = hideWeekendsInput.checked;
  applySettings();
  renderGantt();
});

hideDescriptionsInput.addEventListener('change', () => {
  settings.hideDescriptions = hideDescriptionsInput.checked;
  applySettings();
  renderGantt();
});

exportPdfBtn.addEventListener('click', () => {
  const previousTitle = document.title;
  settingsPanel.hidden = true;
  settingsToggle.setAttribute('aria-expanded', 'false');
  buildPrintableReport();
  document.title = `SICDC LRPSMS Printable Project Plan - ${PROJECT.updatedLabel}`;
  setTimeout(() => {
    window.print();
    document.title = previousTitle;
  }, 50);
});

applySettings();
renderGantt({ scrollToToday: true });
buildPrintableReport();
</script>
